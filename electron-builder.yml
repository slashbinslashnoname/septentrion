appId: com.septentrion.app
productName: Septentrion
directories:
  buildResources: build
  output: dist
# Ad-hoc sign the mac app so it isn't reported as "damaged" on Apple Silicon.
afterPack: build/afterPack.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.*.json}'
publish:
  provider: github
  owner: slashbinslashnoname
  repo: septentrion
  # Publish a real release on tag (electron-builder defaults to a draft).
  releaseType: release
mac:
  category: public.app-category.developer-tools
  # No signing certificate in CI — produce unsigned artifacts.
  identity: null
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Development
